<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Case Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 28px; }
        .header .user-info {
            text-align: right;
        }
        .header .user-info div { font-size: 14px; opacity: 0.9; }
        .header .user-info strong { display: block; font-size: 16px; }
        .content { padding: 30px; }
        .login-section, .main-section { display: none; }
        .login-section.active, .main-section.active { display: block; }
        .login-form {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .login-form h2 { margin-bottom: 20px; color: #333; }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }
        .btn-primary:hover { background: #5568d3; }
        .btn-success {
            background: #48bb78;
            color: white;
        }
        .btn-success:hover { background: #38a169; }
        .btn-warning {
            background: #ed8936;
            color: white;
        }
        .btn-warning:hover { background: #dd6b20; }
        .btn-danger {
            background: #f56565;
            color: white;
        }
        .btn-danger:hover { background: #e53e3e; }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            margin-right: 5px;
        }
        .alert {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .alert-error {
            background: #fed7d7;
            color: #c53030;
            border-left: 4px solid #f56565;
        }
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }
        .alert-info {
            background: #bee3f8;
            color: #2c5282;
            border-left: 4px solid #4299e1;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar select, .toolbar input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .toolbar select:focus, .toolbar input:focus {
            outline: none;
            border-color: #667eea;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover { background: #f8f9fa; }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-new { background: #e6fffa; color: #234e52; }
        .status-reviewing { background: #fef5e7; color: #7d6608; }
        .status-escalated { background: #fdeef4; color: #742a2a; }
        .status-closed_false { background: #d4edda; color: #155724; }
        .status-closed_fraud { background: #f8d7da; color: #721c24; }
        .case-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .case-details h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .detail-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .detail-item label {
            display: block;
            font-weight: 600;
            color: #666;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .detail-item span {
            display: block;
            color: #333;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        .stat-card .label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }
        .logout-btn {
            background: #f56565;
            padding: 8px 16px;
            font-size: 14px;
        }
        .logout-btn:hover { background: #e53e3e; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h2 {
            margin-bottom: 15px;
            color: #333;
        }
        @media (max-width: 768px) {
            .detail-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; }
            .header .user-info { margin-top: 15px; text-align: center; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SECTION -->
        <div class="login-section active">
            <div class="login-form">
                <h2>Fraud Case Management System</h2>
                <div id="loginError"></div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="analyst1, investig1, or admin1">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="e.g., analyst123">
                </div>
                <button class="btn-primary" onclick="login()">Login</button>
                <p style="margin-top: 20px; text-align: center; color: #666; font-size: 12px;">
                    <strong>Demo Credentials:</strong><br>
                    analyst1 / analyst123<br>
                    investig1 / investig123<br>
                    admin1 / admin123
                </p>
            </div>
        </div>

        <!-- MAIN SECTION -->
        <div class="main-section">
            <!-- HEADER -->
            <div class="header">
                <h1>📋 Fraud Case Management</h1>
                <div class="user-info">
                    <div>Logged in as</div>
                    <strong id="currentUser">-</strong>
                    <div id="currentRole" style="margin-top: 5px; font-size: 12px;">-</div>
                    <button class="logout-btn" onclick="logout()" style="margin-top: 10px;">Logout</button>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="content">
                <div id="alertContainer"></div>

                <!-- STATS -->
                <div class="stats" id="statsContainer"></div>

                <!-- TOOLBAR -->
                <div class="toolbar">
                    <button class="btn-success" onclick="triggerScan()" id="scanBtn">🔍 Trigger Rule Scan</button>
                    <select id="statusFilter" onchange="loadCases()">
                        <option value="">All Cases</option>
                        <option value="NEW">NEW</option>
                        <option value="REVIEWING">REVIEWING</option>
                        <option value="ESCALATED">ESCALATED</option>
                        <option value="CLOSED_FALSE">CLOSED_FALSE</option>
                        <option value="CLOSED_FRAUD">CLOSED_FRAUD</option>
                    </select>
                    <button class="btn-primary" onclick="loadCases()">🔄 Refresh</button>
                </div>

                <!-- CASES TABLE -->
                <table id="casesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Status</th>
                            <th>Alert ID</th>
                            <th>Assigned To</th>
                            <th>Opened</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="casesBody">
                        <tr><td colspan="6" style="text-align: center; color: #999;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CASE DETAIL MODAL -->
    <div class="modal" id="caseModal">
        <div class="modal-content">
            <h2 id="modalTitle">Case Details</h2>
            <button onclick="closeCaseModal()" style="position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
            <div id="caseDetailContent"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let authUser = null;
        let authRole = null;

        // ===== AUTHENTICATION =====
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showAlert('Please enter username and password', 'error');
                return;
            }

            fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) throw new Error(data.error);
                authUser = data.username;
                authRole = data.role;
                switchToMain();
                loadCases();
                loadStats();
            })
            .catch(err => showAlert('Login failed: ' + err.message, 'error', 'login'));
        }

        function logout() {
            authUser = null;
            authRole = null;
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').innerHTML = '';
            switchToLogin();
        }

        function switchToLogin() {
            document.querySelector('.login-section').classList.add('active');
            document.querySelector('.main-section').classList.remove('active');
        }

        function switchToMain() {
            document.querySelector('.login-section').classList.remove('active');
            document.querySelector('.main-section').classList.add('active');
            document.getElementById('currentUser').innerText = authUser;
            document.getElementById('currentRole').innerText = authRole;
            document.getElementById('scanBtn').style.display = authRole === 'ADMIN' ? 'block' : 'none';
        }

        // ===== API METHODS =====
        function getAuthHeaders() {
            return {
                'X-User': authUser,
                'X-Role': authRole,
                'Content-Type': 'application/json'
            };
        }

        function loadCases() {
            const status = document.getElementById('statusFilter').value;
            const url = status ? `${API_BASE}/cases?status=${status}` : `${API_BASE}/cases`;

            fetch(url, { headers: getAuthHeaders() })
            .then(r => r.json())
            .then(cases => {
                const tbody = document.getElementById('casesBody');
                if (cases.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">No cases found</td></tr>';
                    return;
                }
                tbody.innerHTML = cases.map(c => `
                    <tr>
                        <td>#${c.id}</td>
                        <td><span class="status-badge status-${c.status.toLowerCase()}">${c.status}</span></td>
                        <td>${c.alertId}</td>
                        <td>${c.assignedTo || '-'}</td>
                        <td>${formatDate(c.openedAt)}</td>
                        <td><button class="btn-primary btn-small" onclick="showCaseDetail(${c.id})">View</button></td>
                    </tr>
                `).join('');
            })
            .catch(err => showAlert('Failed to load cases: ' + err.message, 'error'));
        }

        function loadStats() {
            fetch(`${API_BASE}/cases`, { headers: getAuthHeaders() })
            .then(r => r.json())
            .then(cases => {
                const stats = {
                    total: cases.length,
                    new: cases.filter(c => c.status === 'NEW').length,
                    reviewing: cases.filter(c => c.status === 'REVIEWING').length,
                    escalated: cases.filter(c => c.status === 'ESCALATED').length,
                    closed: cases.filter(c => c.status.includes('CLOSED')).length
                };
                updateStatsDisplay(stats);
            });
        }

        function updateStatsDisplay(stats) {
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><div class="value">${stats.total}</div><div class="label">Total Cases</div></div>
                <div class="stat-card"><div class="value">${stats.new}</div><div class="label">NEW</div></div>
                <div class="stat-card"><div class="value">${stats.reviewing}</div><div class="label">REVIEWING</div></div>
                <div class="stat-card"><div class="value">${stats.escalated}</div><div class="label">ESCALATED</div></div>
                <div class="stat-card"><div class="value">${stats.closed}</div><div class="label">CLOSED</div></div>
            `;
        }

        function showCaseDetail(caseId) {
            fetch(`${API_BASE}/cases/${caseId}`, { headers: getAuthHeaders() })
            .then(r => r.json())
            .then(caseData => {
                const actions = getCaseActions(caseData.status);
                let actionHtml = '';
                if (actions.length > 0) {
                    actionHtml = '<br><strong style="margin-top: 15px; display: block;">Available Actions:</strong><div class="actions" style="margin-top: 10px;">';
                    for (const action of actions) {
                        actionHtml += `<button class="btn-warning btn-small" onclick="performAction(${caseId}, '${action}')">${action}</button>`;
                    }
                    actionHtml += '</div>';
                }

                document.getElementById('caseDetailContent').innerHTML = `
                    <div class="case-details">
                        <div class="detail-row">
                            <div class="detail-item"><label>Case ID</label><span>#${caseData.id}</span></div>
                            <div class="detail-item"><label>Status</label><span><span class="status-badge status-${caseData.status.toLowerCase()}">${caseData.status}</span></span></div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-item"><label>Alert ID</label><span>${caseData.alertId}</span></div>
                            <div class="detail-item"><label>Assigned To</label><span>${caseData.assignedTo || 'Unassigned'}</span></div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-item"><label>Opened At</label><span>${formatDate(caseData.openedAt)}</span></div>
                        </div>
                        ${actionHtml}
                    </div>
                `;
                document.getElementById('caseModal').classList.add('active');
            })
            .catch(err => showAlert('Failed to load case: ' + err.message, 'error'));
        }

        function getCaseActions(status) {
            const actions = [];
            if (status === 'NEW' && authRole === 'ANALYST') actions.push('pickup');
            if (status === 'REVIEWING' && authRole === 'ANALYST') {
                actions.push('escalate', 'close-false');
            }
            if (status === 'ESCALATED') {
                if (authRole === 'INVESTIGATOR') {
                    actions.push('send-back', 'close-false', 'close-fraud');
                }
            }
            return actions;
        }

        function performAction(caseId, action) {
            if (!confirm(`Perform action: ${action}?`)) return;

            fetch(`${API_BASE}/cases/${caseId}/${action}`, {
                method: 'POST',
                headers: getAuthHeaders()
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) throw new Error(data.error);
                showAlert(`Action '${action}' completed successfully`, 'success');
                closeCaseModal();
                loadCases();
                loadStats();
            })
            .catch(err => showAlert('Action failed: ' + err.message, 'error'));
        }

        function triggerScan() {
            if (!confirm('Trigger rule engine scan? This will create cases for all rule violations.')) return;

            fetch(`${API_BASE}/rules/scan`, {
                method: 'POST',
                headers: getAuthHeaders()
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) throw new Error(data.error);
                showAlert(`✓ Scan completed! ${data.casesOpened} cases opened.`, 'success');
                loadCases();
                loadStats();
            })
            .catch(err => showAlert('Scan failed: ' + err.message, 'error'));
        }

        function closeCaseModal() {
            document.getElementById('caseModal').classList.remove('active');
        }

        // ===== UTILITIES =====
        function formatDate(dateString) {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleString();
        }

        function showAlert(message, type, section = 'main') {
            const container = section === 'login'
                ? document.getElementById('loginError')
                : document.getElementById('alertContainer');

            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerText = message;
            container.innerHTML = '';
            container.appendChild(alertDiv);

            if (type !== 'error') {
                setTimeout(() => alertDiv.remove(), 5000);
            }
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeCaseModal();
        });

        // Close modal on outside click
        document.getElementById('caseModal').addEventListener('click', (e) => {
            if (e.target.id === 'caseModal') closeCaseModal();
        });
    </script>
</body>
</html>
